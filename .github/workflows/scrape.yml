name: scrape

on:
  schedule:
    # Monthly: first Monday of each month at 01:00 UTC (06:30 IST)
    - cron: "0 1 1-7 * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run scrape
        run: node scripts/scrape.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/
            git commit -m "chore(data): monthly pincode refresh"
            git push
          else
            echo "No changes."
          fi
